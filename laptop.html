<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Nilai Laptop Anda</title>

  <!-- 主样式 -->
  <link rel="stylesheet" href="/css/main.css">

  <style>
    /* 页面容器 */
    .container {
      max-width: 480px;
      margin: auto;
      padding: 1rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 1rem;
    }

    /* 品牌选择（统一 grid-card 体系） */
    .brand-selection {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.8rem;
      margin: 1.5rem 0;
    }

    .brand-card {
      cursor: pointer;
      padding: 0.8rem 0.5rem;
      text-align: center;
      transition: all 0.2s ease;
    }

    .brand-logo {
      height: 32px;
      object-fit: contain;
      margin-bottom: 0.3rem;
      filter: brightness(0) invert(1);
    }

    .brand-card h3 {
      font-size: 0.85rem;
      margin: 0;
    }

    .brand-card.active {
      border-color: var(--secondary-color);
      background: rgba(245,197,66,0.15);
      transform: translateY(-2px);
    }

    .brand-card.active .brand-logo {
      filter: none;
    }

    .brand-card:hover {
      transform: translateY(-3px);
    }

    /* 按钮 */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--secondary-color);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>Cek Nilai Laptop Anda</h1>

  <!-- 品牌选择 -->
  <div class="brand-selection">

    <div class="grid-card brand-card active" data-brand="apple">
      <img src="/images/brands/apple.svg" class="brand-logo" alt="Apple">
      <h3>Apple</h3>
    </div>

    <div class="grid-card brand-card" data-brand="lenovo">
      <img src="/images/brands/lenovo.svg" class="brand-logo" alt="Lenovo">
      <h3>Lenovo</h3>
    </div>

    <div class="grid-card brand-card" data-brand="dell">
      <img src="/images/brands/dell.svg" class="brand-logo" alt="Dell">
      <h3>Dell</h3>
    </div>

    <div class="grid-card brand-card" data-brand="asus">
      <img src="/images/brands/asus.svg" class="brand-logo" alt="ASUS">
      <h3>ASUS</h3>
    </div>

    <div class="grid-card brand-card" data-brand="hp">
      <img src="/images/brands/hp.svg" class="brand-logo" alt="HP">
      <h3>HP</h3>
    </div>

    <div class="grid-card brand-card" data-brand="acer">
      <img src="/images/brands/acer.svg" class="brand-logo" alt="Acer">
      <h3>Acer</h3>
    </div>

    <div class="grid-card brand-card" data-brand="msi">
      <img src="/images/brands/msi.svg" class="brand-logo" alt="MSI">
      <h3>MSI</h3>
    </div>

  </div>

  <!-- 下一步按钮 -->
  <button class="btn-primary" onclick="nextStep()">
    Lanjutkan
  </button>

</div>

<script>
  // 品牌选择逻辑
  const brandCards = document.querySelectorAll('.brand-card');
  let selectedBrand = 'apple';

  brandCards.forEach(card => {
    card.addEventListener('click', () => {
      brandCards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      selectedBrand = card.dataset.brand;
    });
  });

  function nextStep() {
    alert("Brand dipilih: " + selectedBrand);
    // 这里后续可以跳转下一步
  }
</script>

</body>
</html>
