<!DOCTYPE html>
<html lang="id-ID">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimasi Gadai Laptop</title>

<style>
body{font-family:sans-serif;background:#0b2c4a;color:white;margin:0;padding:20px}
.container{max-width:800px;margin:auto}
.brand-option{display:inline-block;padding:10px;border:1px solid #fff;margin:5px;cursor:pointer;border-radius:10px}
.brand-option.active{background:#f5c542;color:#000}
.form-step{display:none}
.form-step.active{display:block}
button{padding:10px 15px;margin-top:10px;border:none;border-radius:20px;cursor:pointer}
.btn-next,.btn-submit{background:#f5c542}
.btn-prev{background:#444;color:#fff}
.estimation-card{margin-top:20px;padding:20px;border:1px solid #f5c542;border-radius:15px}
.value{font-size:20px;font-weight:bold}
</style>
</head>

<body>
<div class="container">

<h2>💻 Estimasi Gadai Laptop</h2>

<!-- STEP 1 -->
<div id="step1" class="form-step active">

<div>
<div class="brand-option active" data-brand="apple">Apple</div>
<div class="brand-option" data-brand="asus">ASUS</div>
<div class="brand-option" data-brand="lenovo">Lenovo</div>
</div>

<select id="cpu">
<option value="i3">i3</option>
<option value="i5" selected>i5</option>
<option value="i7">i7</option>
</select>

<select id="ram">
<option value="8">8GB</option>
<option value="16" selected>16GB</option>
</select>

<button class="btn-next">Next</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="form-step">

<select id="age">
<option value="1">1-2 tahun</option>
<option value="3">3-4 tahun</option>
</select>

<button class="btn-prev">Back</button>
<button class="btn-submit">Hitung</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="form-step">
<div id="resultContainer"></div>
<button class="btn-prev">Edit</button>
</div>

</div>

<script>
// ===== FORMAT =====
function formatRupiah(num){
  return "Rp " + new Intl.NumberFormat("id-ID").format(num);
}

// ===== REAL ALGORITHM =====
function getBasePrice(brand,cpu){
  const brandFactor={apple:1,lenovo:0.85,asus:0.86};
  const cpuBase={i3:2500000,i5:3800000,i7:5500000};
  return (cpuBase[cpu]||3800000)*(brandFactor[brand]||0.85);
}
function getRamFactor(r){return r>=16?1.08:1}
function getStorageFactor(){return 1.04}
function getGpuFactor(){return 1.05}
function getAgeFactor(a){return a==1?0.85:0.7}
function getPhysicalFactor(){return 1}
function getBatteryFactor(){return 1}
function getAccessoriesFactor(){return 1}
function getPawnRatio(){return 0.6}

// ===== MAIN =====
function calculateAndShow(){

const brand=document.querySelector('.brand-option.active')?.dataset.brand||'asus';
const cpu=document.getElementById('cpu')?.value||'i5';
const ram=parseInt(document.getElementById('ram')?.value||16);
const age=parseInt(document.getElementById('age')?.value||1);

let value=getBasePrice(brand,cpu);
value*=getRamFactor(ram)*getStorageFactor()*getGpuFactor();
value*=getAgeFactor(age);
value=Math.max(Math.round(value),400000);

const marketMin=Math.round(value*0.9);
const marketMax=Math.round(value*1.1);

const pawnValue=Math.round(value*getPawnRatio());
const pawnMin=Math.round(pawnValue*0.92);
const pawnMax=Math.round(pawnValue*1.08);
const pawnAvg=Math.round((pawnMin+pawnMax)/2);

// ===== WhatsApp 成交文案 =====
const message=`Halo Admin JF Gadai,

Saya ingin gadai laptop:

💻 ${brand.toUpperCase()} ${cpu.toUpperCase()} | RAM ${ram}GB

📊 Estimasi pinjaman:
${formatRupiah(pawnMin)} - ${formatRupiah(pawnMax)}
(Rata-rata sekitar ${formatRupiah(pawnAvg)})

Saya siap proses hari ini, mohon info langkah selanjutnya.`;

const wa=encodeURIComponent(message);

// ===== UI =====
document.getElementById('resultContainer').innerHTML=`
<div class="estimation-card">

<div>💰 Nilai Pasar</div>
<div class="value">${formatRupiah(marketMin)} – ${formatRupiah(marketMax)}</div>

<br>

<div>🏦 Pinjaman</div>
<div class="value">${formatRupiah(pawnMin)} – ${formatRupiah(pawnMax)}</div>

<div style="margin-top:8px;font-size:0.9rem">
💡 Rata-rata: <b>${formatRupiah(pawnAvg)}</b>
</div>

<br>

<a href="https://wa.me/6289515692586?text=${wa}" target="_blank">
<button style="background:#25D366;color:white">WhatsApp Sekarang</button>
</a>

</div>
`;
}

// ===== STEP =====
let step=1;
function showStep(n){
document.querySelectorAll('.form-step').forEach((el,i)=>{
el.classList.toggle('active',i===n-1);
});
step=n;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{

document.querySelectorAll('.brand-option').forEach(el=>{
el.addEventListener('click',()=>{
document.querySelectorAll('.brand-option').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
});
});

document.querySelector('.btn-next')?.addEventListener('click',()=>showStep(2));

document.querySelectorAll('.btn-prev').forEach(btn=>{
btn.addEventListener('click',()=>{
if(step===2)showStep(1);
else if(step===3)showStep(2);
});
});

document.querySelector('.btn-submit')?.addEventListener('click',(e)=>{
e.preventDefault();
calculateAndShow();
showStep(3);
});

});
</script>

</body>
</html>
