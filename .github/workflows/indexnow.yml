name: 🔍 IndexNow - 手动提交首页到Bing

on: 
  # 只支持手动触发
  workflow_dispatch:
    inputs:
      reason:
        description: '提交原因（可选）'
        required: false
        default: '网站更新'

jobs:
  submit-to-bing:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 提交首页到 Bing
        env:
          KEY: "964fa0042fac44648205cc02f45d4f05"
          LOCATION: "https://www.jfgadai.com/964fa0042fac44648205cc02f45d4f05.txt"
        run: |
          echo "========================================"
          echo "🚀 IndexNow 手动提交"
          echo "========================================"
          echo "时间: $(date)"
          echo "网站: https://www.jfgadai.com/"
          echo "原因: ${{ github.event.inputs.reason }}"
          echo "搜索引擎: Bing (通过IndexNow协议)"
          echo "========================================"
          echo ""
          
          echo "📡 正在提交..."
          curl -s -o /dev/null -w "HTTP状态码: %{http_code}\n" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "www.jfgadai.com",
              "key": "'"$KEY"'",
              "keyLocation": "'"$LOCATION"'",
              "urlList": ["https://www.jfgadai.com/"]
              "urlList": ["https://www.jfgadai.com/edukasi-gadai.html"]
              "urlList": ["https://www.jfgadai.com/risk-to-success.html"]
              "urlList": ["https://www.jfgadai.com/gallery.html"]
              "urlList": ["https://www.jfgadai.com/contact.html"]
              "urlList": ["https://www.jfgadai.com/assessment.html"]
            }'
          
          echo ""
          echo "✅ 提交完成"
          echo ""
          echo "💡 Bing 会在几小时内处理"
          echo "🌐 其他IndexNow支持的搜索引擎也会收到"
          echo ""
          echo "========================================"
